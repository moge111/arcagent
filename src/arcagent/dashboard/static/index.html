<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">T</div>
            <div>
                <h1>Terry</h1>
                <span class="subtitle">AI Agent</span>
            </div>
        </div>
        <div id="status-badge" class="badge">Connecting...</div>
    </header>

    <main>
        <section class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="uptime">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sessions</div>
                <div class="stat-value" id="sessions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Skills</div>
                <div class="stat-value" id="skills-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tools</div>
                <div class="stat-value" id="tools-count">0</div>
            </div>
        </section>

        <div class="two-col">
            <section class="panel">
                <div class="panel-header">
                    <h2>Skills</h2>
                    <span class="panel-badge" id="skills-enabled-badge">0</span>
                </div>
                <div id="skills-list" class="skills-list">
                    <div class="loading-spinner"></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <h2>Tools</h2>
                    <span class="panel-badge" id="tools-badge">0</span>
                </div>
                <div id="tools-list" class="tools-list">
                    <div class="loading-spinner"></div>
                </div>
            </section>
        </div>

        <section class="panel">
            <div class="panel-header">
                <h2>Conversations</h2>
                <span class="panel-badge" id="convos-badge">0</span>
            </div>
            <div id="convos-list" class="convos-list">
                <p class="muted">No active conversations</p>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>Log</h2>
                <button class="btn-small" onclick="refreshLogs()">Refresh</button>
            </div>
            <div id="logs-list" class="logs-list">
                <p class="muted">No activity</p>
            </div>
        </section>
    </main>

    <footer>
        <span>Terry v0.1.0</span>
        <span>Claude Opus</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
