<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcAgent Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ArcAgent Dashboard</h1>
        <div id="status-badge" class="badge">Loading...</div>
    </header>

    <main>
        <section id="status-panel" class="panel">
            <h2>Status</h2>
            <div class="grid">
                <div class="stat">
                    <span class="stat-value" id="uptime">--</span>
                    <span class="stat-label">Uptime</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="sessions">--</span>
                    <span class="stat-label">Active Sessions</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="skills-count">--</span>
                    <span class="stat-label">Skills</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="tools-count">--</span>
                    <span class="stat-label">Tools</span>
                </div>
            </div>
        </section>

        <section id="skills-panel" class="panel">
            <h2>Skills</h2>
            <div id="skills-list" class="skills-list">
                <p class="muted">Loading skills...</p>
            </div>
        </section>

        <section id="logs-panel" class="panel">
            <h2>Recent Logs</h2>
            <div id="logs-list" class="logs-list">
                <p class="muted">Loading logs...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
